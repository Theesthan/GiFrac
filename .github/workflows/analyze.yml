name: AI Code Refactoring Analysis

on:
  workflow_dispatch:
      inputs:
            repo_url:
                    description: GitHub repository URL to analyze
                            required: true
                                    default: https://github.com/Theesthan/GiFrac
                                          branch:
                                                  description: Branch to analyze
                                                          required: false
                                                                  default: main
                                                                    schedule:
                                                                        - cron: '0 6 * * 1'

                                                                        permissions:
                                                                          contents: write
                                                                            pages: write
                                                                              id-token: write

                                                                              jobs:
                                                                                analyze:
                                                                                    runs-on: ubuntu-latest
                                                                                        steps:
                                                                                              - name: Checkout
                                                                                                      uses: actions/checkout@v4
                                                                                                      
                                                                                                            - name: Set up Python 3.11
                                                                                                                    uses: actions/setup-python@v5
                                                                                                                            with:
                                                                                                                                      python-version: '3.11'
                                                                                                                                      
                                                                                                                                            - name: Install dependencies
                                                                                                                                                    run: |
                                                                                                                                                              python -m pip install --upgrade pip
                                                                                                                                                                        pip install -r requirements.txt
                                                                                                                                                                        
                                                                                                                                                                              - name: Run AI Refactoring Pipeline
                                                                                                                                                                                      env:
                                                                                                                                                                                                LLM_PROVIDER: mock
                                                                                                                                                                                                        run: |
                                                                                                                                                                                                                  python main.py "https://github.com/Theesthan/GiFrac" \
                                                                                                                                                                                                                              --output ./docs \
                                                                                                                                                                                                                                          --iterations 500
                                                                                                                                                                                                                                          
                                                                                                                                                                                                                                                - name: Upload report
                                                                                                                                                                                                                                                        uses: actions/upload-artifact@v4
                                                                                                                                                                                                                                                                with:
                                                                                                                                                                                                                                                                          name: refactoring-report
                                                                                                                                                                                                                                                                                    path: docs/
                                                                                                                                                                                                                                                                                    
                                                                                                                                                                                                                                                                                          - name: Deploy to GitHub Pages
                                                                                                                                                                                                                                                                                                  uses: peaceiris/actions-gh-pages@v4
                                                                                                                                                                                                                                                                                                          if: github.ref == 'refs/heads/main'
                                                                                                                                                                                                                                                                                                                  with:
                                                                                                                                                                                                                                                                                                                            github_token: ${{ secrets.GITHUB_TOKEN }}
                                                                                                                                                                                                                                                                                                                                      publish_dir: ./docs
                                                                                                                                                                                                                                                                                                                                                publish_branch: gh-pages
                                                                                                                                                                                                                                                                                                                                                          commit_message: Deploy refactoring report
                                                                                                                                                                                                                                                                                                                                                          
